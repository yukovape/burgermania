<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burger Mania - Menu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #120B09; font-family: 'Poppins', sans-serif; color: white; }
        .mania-gradient { background: linear-gradient(90deg, #EF3E36 0%, #F8A123 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* Animation du logo qui respire */
        @keyframes pulse-logo { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        .animate-logo { animation: pulse-logo 2s infinite ease-in-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="splash" class="fixed inset-0 z-[100] bg-[#120B09] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative w-48 h-48 mb-6 flex items-center justify-center">
            <img src="https://i.ibb.co/XfXf8PZ/burger-mania-logo.png" class="w-full animate-logo" alt="Logo">
        </div>
        <div class="w-32 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="bar" class="h-full mania-gradient w-0 transition-all duration-1000 ease-out"></div>
        </div>
        <p class="mt-4 text-xs tracking-[0.3em] uppercase text-white/40">Préparation de la Mania...</p>
    </div>

    <div id="main-content" class="opacity-0 transition-opacity duration-1000">
        
        <header class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
            <img src="https://i.ibb.co/XfXf8PZ/burger-mania-logo.png" class="w-12 h-auto" alt="Logo">
            <div class="bg-white/10 p-2 rounded-full">🛒</div>
        </header>

        <main class="pt-28 pb-32 px-6">
            <h2 class="text-4xl font-black mb-2">BURGER <span class="text-orange-500">MANIA</span></h2>
            <p class="text-white/50 text-sm mb-8">Le meilleur Kebab & Burger de la ville.</p>

            <div class="flex space-x-4 overflow-x-auto no-scrollbar mb-10 pb-2">
                <button class="mania-gradient px-6 py-2 rounded-full font-bold text-sm">Burgers</button>
                <button class="bg-white/5 px-6 py-2 rounded-full font-bold text-sm">Kebabs</button>
                <button class="bg-white/5 px-6 py-2 rounded-full font-bold text-sm">Boissons</button>
            </div>

            <div class="space-y-8">
                <div class="glass rounded-[30px] p-4 relative">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600" class="w-full h-56 object-cover rounded-[20px] mb-4">
                    <h3 class="text-xl font-bold">The King Cheese</h3>
                    <p class="text-white/40 text-xs mb-4">Double steak, quadruple cheddar, sauce maison.</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-orange-400">13.90€</span>
                        <button onclick="add()" class="mania-gradient w-12 h-12 rounded-2xl font-bold text-2xl">+</button>
                    </div>
                </div>

                <div class="glass rounded-[30px] p-4 relative">
                    <img src="https://images.unsplash.com/photo-1649931306352-7b003c2bb3e7?w=600" class="w-full h-56 object-cover rounded-[20px] mb-4">
                    <h3 class="text-xl font-bold">Kebab Royal Mix</h3>
                    <p class="text-white/40 text-xs mb-4">Veau, dinde, légumes grillés, sauce blanche truffée.</p>
                    <div class="flex justify-between items-center">
                        <span class="text-2xl font-black text-orange-400">11.50€</span>
                        <button onclick="add()" class="mania-gradient w-12 h-12 rounded-2xl font-bold text-2xl">+</button>
                    </div>
                </div>
            </div>
        </main>

        <div class="fixed bottom-6 left-6 right-6 z-50">
            <button class="w-full h-16 mania-gradient rounded-3xl shadow-2xl flex justify-between items-center px-8 font-black uppercase tracking-wider">
                <span>Panier (<span id="count">0</span>)</span>
                <span id="total">0.00€</span>
            </button>
        </div>
    </div>

    <script>
        // Logique de chargement
        window.onload = () => {
            document.getElementById('bar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                document.getElementById('main-content').style.opacity = '1';
                setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 700);
            }, 1500);
        };

        // Petit script de panier pour faire pro
        let items = 0;
        let price = 0;
        function add() {
            items++;
            price += 13.90;
            document.getElementById('count').innerText = items;
            document.getElementById('total').innerText = price.toFixed(2) + "€";
        }
    </script>
</body>
</html>
