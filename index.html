<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burger Mania | Expérience Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        dark: '#120B09',
                        maniaRed: '#EF3E36',
                        maniaOrange: '#F8A123',
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #EF3E36, #F8A123); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gradient { background: linear-gradient(135deg, #EF3E36 0%, #F8A123 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { opacity: 0; transform: translateY(20px); }
        #splash { background: radial-gradient(circle at center, #231510 0%, #120B09 100%); }
    </style>
</head>
<body class="bg-dark text-white font-sans overflow-x-hidden">

    <div id="splash" class="fixed inset-0 z-[100] flex flex-col items-center justify-center">
        <div id="splash-logo-container" class="relative">
            <img src="https://i.ibb.co/XfXf8PZ/burger-mania-logo.png" alt="Logo" class="w-40 h-auto opacity-0 scale-50" id="loader-logo">
        </div>
        <div class="mt-8 w-48 h-[2px] bg-white/10 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full btn-gradient w-0"></div>
        </div>
    </div>

    <div id="app" class="invisible">
        
        <header class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center glass border-b border-white/5">
            <img src="https://i.ibb.co/XfXf8PZ/burger-mania-logo.png" class="w-12 h-auto" alt="Logo">
            <div class="flex items-center space-x-4">
                <button class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                </button>
            </div>
        </header>

        <main class="pt-28 pb-32 px-6">
            <section class="mb-10">
                <h2 class="text-4xl font-extrabold tracking-tight">L'art du <br><span class="gradient-text">Gourmet Mania.</span></h2>
                <p class="text-white/40 mt-3 text-sm">Scannez. Choisissez. Savourez.</p>
            </section>

            <div class="flex space-x-4 overflow-x-auto no-scrollbar mb-10 -mx-6 px-6">
                <button class="btn-gradient px-8 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-maniaRed/20">🔥 Burgers</button>
                <button class="bg-white/5 px-8 py-3 rounded-2xl font-bold text-sm border border-white/5">🌯 Kebabs</button>
                <button class="bg-white/5 px-8 py-3 rounded-2xl font-bold text-sm border border-white/5">🍟 Sides</button>
            </div>

            <div class="grid grid-cols-1 gap-8">
                
                <div class="product-card group relative overflow-hidden rounded-[32px] glass p-4">
                    <div class="relative h-64 overflow-hidden rounded-[24px] mb-6">
                        <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Burger">
                        <div class="absolute top-4 right-4 bg-black/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                            <span class="text-sm font-bold">14.90€</span>
                        </div>
                    </div>
                    <div class="px-2 pb-2">
                        <h3 class="text-xl font-bold mb-2">Le Royal Black Angus</h3>
                        <p class="text-white/50 text-xs leading-relaxed mb-6">Boeuf maturé 30 jours, truffe noire, cheddar fumé et oignons caramélisés au miel.</p>
                        <button onclick="updateCart()" class="w-full py-4 btn-gradient rounded-2xl font-extrabold flex items-center justify-center space-x-2 active:scale-95 transition-transform">
                            <span>Ajouter au panier</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="product-card group relative overflow-hidden rounded-[32px] glass p-4">
                    <div class="relative h-64 overflow-hidden rounded-[24px] mb-6">
                        <img src="https://images.unsplash.com/photo-1561651823-34feb02250e4?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Kebab">
                        <div class="absolute top-4 right-4 bg-black/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                            <span class="text-sm font-bold">12.50€</span>
                        </div>
                    </div>
                    <div class="px-2 pb-2">
                        <h3 class="text-xl font-bold mb-2">Le Kebab Berinois</h3>
                        <p class="text-white/50 text-xs leading-relaxed mb-6">Veau à la broche maison, légumes grillés à la flamme, sauce yaourt menthe fraîche.</p>
                        <button onclick="updateCart()" class="w-full py-4 btn-gradient rounded-2xl font-extrabold flex items-center justify-center space-x-2 active:scale-95 transition-transform">
                            <span>Ajouter au panier</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"/></svg>
                        </button>
                    </div>
                </div>

            </div>
        </main>

        <div class="fixed bottom-0 left-0 right-0 p-6 z-50">
            <div id="cart-bar" class="w-full h-20 bg-white text-black rounded-[24px] flex items-center justify-between px-8 shadow-[0_20px_50px_rgba(239,62,54,0.3)] translate-y-32">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold uppercase tracking-widest opacity-40">Votre Panier</span>
                    <span class="text-xl font-black" id="cart-total">0.00€</span>
                </div>
                <button class="bg-black text-white px-6 py-3 rounded-xl font-bold text-sm flex items-center space-x-2">
                    <span>Commander</span>
                    <div class="w-5 h-5 bg-maniaRed rounded-full text-[10px] flex items-center justify-center" id="count-badge">0</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Animations GSAP
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();

            // 1. Splash Animation
            tl.to("#loader-logo", { opacity: 1, scale: 1, duration: 1, ease: "back.out(1.7)" })
              .to("#progress-bar", { width: "100%", duration: 1.5, ease: "power2.inOut" }, "-=0.5")
              .to("#splash", { y: "-100%", duration: 0.8, ease: "expo.inOut" })
              
            // 2. App Reveal
              .set("#app", { visibility: "visible" })
              .from("header", { y: -50, opacity: 0, duration: 0.6 }, "-=0.2")
              .from("h2", { y: 30, opacity: 0, duration: 0.6 }, "-=0.4")
              .to(".product-card", { opacity: 1, y: 0, duration: 0.8, stagger: 0.2, ease: "power3.out" }, "-=0.3");
        });

        // Logique Panier
        let count = 0;
        let total = 0;

        function updateCart() {
            count++;
            total += 14.90; // Simulation prix fixe
            
            document.getElementById('count-badge').innerText = count;
            document.getElementById('cart-total').innerText = total.toFixed(2) + "€";

            // Faire apparaître la barre de panier si c'est le premier item
            if(count === 1) {
                gsap.to("#cart-bar", { y: 0, duration: 0.6, ease: "back.out(1.5)" });
            }

            // Animation de rebond sur le badge
            gsap.from("#count-badge", { scale: 1.5, duration: 0.2, yoyo: true, repeat: 1 });
        }
    </script>
</body>
</html>
