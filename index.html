<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burger Mania - Menu Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #120B09; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .mania-gradient { background: linear-gradient(135deg, #EF3E36 0%, #F8A123 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); }
        @keyframes pulse-crown { 0%, 100% { transform: scale(1) rotate(-5deg); } 50% { transform: scale(1.2) rotate(5deg); } }
        .animate-crown { display: inline-block; animation: pulse-crown 2s infinite ease-in-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="splash" class="fixed inset-0 z-[100] bg-[#120B09] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="text-center">
            <span class="text-7xl animate-crown mb-4">👑</span>
            <h1 class="text-4xl font-black tracking-tighter mt-4">BURGER<br><span class="text-orange-500">MANIA</span></h1>
        </div>
        <div class="w-32 h-1 bg-white/10 rounded-full overflow-hidden mt-8">
            <div id="bar" class="h-full mania-gradient w-0 transition-all duration-1000 ease-out"></div>
        </div>
    </div>

    <div id="main-content" class="opacity-0 transition-opacity duration-1000">
        
        <header class="fixed top-0 w-full z-50 glass px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">👑</span>
                <span class="font-black text-sm tracking-tighter">BURGER <span class="text-orange-500">MANIA</span></span>
            </div>
            <div class="bg-orange-500/20 p-2 rounded-xl text-orange-500 font-bold text-xs">OUVERT</div>
        </header>

        <main class="pt-28 pb-32 px-6 text-center">
            <h2 class="text-3xl font-extrabold mb-8 italic">Prêt pour la <span class="text-orange-500 underline">Mania</span> ?</h2>

            <div class="space-y-10 text-left">
                <div class="glass rounded-[35px] p-4">
                    <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=600" class="w-full h-52 object-cover rounded-[25px] mb-4 shadow-xl">
                    <div class="px-2">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-bold">Le Black Angus Royal</h3>
                            <span class="bg-orange-500 px-3 py-1 rounded-lg text-sm font-black text-black">14€</span>
                        </div>
                        <p class="text-white/40 text-xs mb-6 leading-relaxed">Pain brioché, bœuf maturé, oignons rouges, et notre sauce secrète Mania.</p>
                        <button onclick="add(14)" class="w-full py-4 mania-gradient rounded-2xl font-black uppercase text-sm shadow-lg shadow-red-600/20 active:scale-95 transition-transform">Ajouter +</button>
                    </div>
                </div>

                <div class="glass rounded-[35px] p-4">
                    <img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=600" class="w-full h-52 object-cover rounded-[25px] mb-4 shadow-xl">
                    <div class="px-2">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-bold">Kebab Berlinois Premium</h3>
                            <span class="bg-orange-500 px-3 py-1 rounded-lg text-sm font-black text-black">12€</span>
                        </div>
                        <p class="text-white/40 text-xs mb-6 leading-relaxed">Veau tranché fin, légumes grillés, feta, citron et sauce blanche maison.</p>
                        <button onclick="add(12)" class="w-full py-4 mania-gradient rounded-2xl font-black uppercase text-sm shadow-lg shadow-red-600/20 active:scale-95 transition-transform">Ajouter +</button>
                    </div>
                </div>
            </div>
        </main>

        <div class="fixed bottom-6 left-6 right-6 z-50">
            <button class="w-full h-16 bg-white text-black rounded-3xl shadow-2xl flex justify-between items-center px-8 font-black">
                <span class="flex items-center"><span class="bg-black text-white px-2 py-1 rounded-lg text-xs mr-3" id="count">0</span> PANIER</span>
                <span id="total">0.00€</span>
            </button>
        </div>
    </div>

    <script>
        window.onload = () => {
            document.getElementById('bar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                document.getElementById('main-content').style.opacity = '1';
                setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 700);
            }, 1200);
        };

        let items = 0;
        let total = 0;
        function add(price) {
            items++;
            total += price;
            document.getElementById('count').innerText = items;
            document.getElementById('total').innerText = total.toFixed(2) + "€";
            // Petit effet de vibration
            window.navigator.vibrate(50);
        }
    </script>
</body>
</html>
